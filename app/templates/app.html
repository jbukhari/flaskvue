{# This is a Jinja template #}

{% extends 'base.html' %}
{% block content %}
<div id="app"></div>

<script type="module">
  // JS modules are loaded using the importmap defined in base.html
  import { createApp } from "vue"
  import { createPinia, defineStore } from "pinia"

  /* Create Vue app using the Options API */
  // https://vuejs.org/api/options-state.html
  // The app has no attributes except for the template calling the main component.
  const app = createApp({
    template: /* html */ `
      <main-component />
    `
  })

  // Change the global Vue template delimiters so they don't conflict with Jinja delimiters
  app.config.compilerOptions.delimiters = ['[[', ']]']

  /* Create Pinia state manager using option stores */
  // https://pinia.vuejs.org/core-concepts/#Option-Stores
  // Set component data fields to Pinia store objects for reactivity.
  const pinia = createPinia()
  const useMainStore = defineStore("mainStore", {
    state: () => ({items: []}), // the reactive data
    getters: {count: (state) => state.items.length},
    actions: {addItem(item) {this.items.push(item)}},
  })
  // Register the Pinia object with the Vue app
  app.use(pinia)

  /* Components */
  /* main-component */
  app.component(
    "main-component",
    {
      template: /* html */ `
        <div id="main-container">
            <div <div id="header-container">
              <header-component />
            </div>
            <div id="sidebar-container">
              <sidebar-component "/>
            </div>
            <div id="content-container">
              <content-component />
            </div>
        </div>
      `
    }
  )

  app.component(
    "header-component",
    {
      template: /* html */ `
        <div id="header-component">
          HEADER
        </div>
      `
    }
  )

  app.component(
    "sidebar-component",
    {
      data: () => {
        return {
          mainStore: useMainStore()
        }
      },
      template: /* html */ `
        <div id=sidebar-component>
          SIDEBAR
        </div>
      `
    }
  )

  app.component(
    "content-component",
    {
      props: [],
      data: () => {
        return {
            range: Array(1),
            mainStore: useMainStore()
        }
      },
      created() {},
      template: /* html */ `
        <div id="content-component  ">    
          <h3>main component</h3>
          <p>hello {{ user }}</p> <!-- double curly braces embed Jinja variables -->
        </div>
      `,
      mounted() {},
      updated() {}
    }
  )

  app.mount("#app")
</script>

{% endblock %}
